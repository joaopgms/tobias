<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="c">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <!-- Red left half -->
  <rect x="0" y="0" width="100" height="200" fill="#C8102E" clip-path="url(#c)"/>
  <!-- Blue right half -->
  <rect x="100" y="0" width="100" height="200" fill="#1D428A" clip-path="url(#c)"/>
  <!-- Player silhouette -->
  <g fill="white" clip-path="url(#c)">
    <!-- Head -->
    <circle cx="113" cy="52" r="14"/>
    <!-- Torso -->
    <ellipse cx="102" cy="98" rx="20" ry="35" transform="rotate(-8,102,98)"/>
    <!-- Left arm raised upper-left (shoulder 87,75 → hand 65,42) -->
    <rect x="56" y="52" width="40" height="13" rx="6" transform="rotate(-124,76,58.5)"/>
    <!-- Right arm dribbling lower-right (shoulder 118,75 → hand 142,132) -->
    <rect x="99" y="97" width="62" height="13" rx="6" transform="rotate(67,130,103.5)"/>
    <!-- Left leg forward lower-left (hip 90,118 → foot 66,162) -->
    <rect x="52.5" y="133.5" width="51" height="13" rx="6" transform="rotate(119,78,140)"/>
    <!-- Right leg back lower-right (hip 110,118 → foot 130,162) -->
    <rect x="96" y="133.5" width="48" height="13" rx="6" transform="rotate(66,120,140)"/>
    <!-- Basketball at dribble position -->
    <circle cx="146" cy="138" r="10"/>
  </g>
</svg>
