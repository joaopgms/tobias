name: Tobias — Commit Check (every 30 min)

on:
  schedule:
    # Every 30 min from 14:00–02:00 UTC — covers all NBA tip-off windows
    - cron: '*/30 14-23 * * *'
    - cron: '*/30 0-2 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run commit (self-gating — exits silently if not time yet)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GH_PAT }}
          GITHUB_REPO:       ${{ github.repository }}
          ODDSPAPI_KEY:      ${{ secrets.ODDSPAPI_KEY }}
          THE_ODDS_API_KEY:  ${{ secrets.THE_ODDS_API_KEY }}
          LLM_PROVIDER:      ${{ vars.LLM_PROVIDER || 'claude' }}
        run: python run.py commit_if_ready
