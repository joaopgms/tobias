name: Tobias — Commit (16:30 UTC daily)

on:
  schedule:
    # Once daily at 16:30 UTC — after Scout (14:00) and before first tip-off (~17:00)
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run commit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GH_PAT }}
          GITHUB_REPO:       ${{ github.repository }}
          ODDSPAPI_KEY:      ${{ secrets.ODDSPAPI_KEY }}
          THE_ODDS_API_KEY:  ${{ secrets.THE_ODDS_API_KEY }}
          LLM_PROVIDER:      ${{ vars.LLM_PROVIDER || 'claude' }}
        run: python run.py commit
